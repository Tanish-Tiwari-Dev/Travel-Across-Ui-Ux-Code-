<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Travel Beyond Boundaries</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="nav">
    <div class="nav__inner">
      <a href="index.html" class="nav__logo" aria-label="Travel Beyond Boundaries home">
        <img src="assets/icons/logo.svg" alt="" width="64" height="64">
      </a>
      <nav class="nav__links" aria-label="Main navigation">
        <a href="index.html" class="nav__link">Home</a>
        <a href="index.html#international" class="nav__link">International</a>
        <a href="index.html" class="nav__link">About Us</a>
        <a href="index.html" class="nav__link">Contacts</a>
      </nav>
      <div class="nav__actions">
        <a href="login.html" class="nav__login">Log In</a>
        <a href="signup.html" class="btn btn--signup">Sign Up</a>
        <button type="button" class="nav__toggle" aria-label="Toggle navigation">
          <span class="nav__toggle-bar"></span>
          <span class="nav__toggle-bar"></span>
          <span class="nav__toggle-bar"></span>
        </button>
      </div>
    </div>
  </header>

  <main>
    <section class="auth-page">
      <div class="auth-card">
        <h1 class="auth-card__title">Create Account</h1>
        <form class="auth-card__form" aria-label="Sign up form">
          <input type="text" class="auth-card__input" placeholder="Full Name" required>
          <input type="email" class="auth-card__input" placeholder="Email address" required>
          <input type="password" class="auth-card__input" placeholder="Password" required>
          <input type="password" class="auth-card__input" placeholder="Confirm Password" required>
          <button type="submit" class="btn btn--primary auth-card__submit">Sign Up</button>
        </form>
        <p class="auth-card__footer">
          Already have an account? <a href="login.html" class="auth-card__link">Log In</a>
        </p>
      </div>
    </section>
  </main>

  <script src="js/main.js"></script>
</body>
</html>
